name: alias_env
channels:
  - pytorch
  - nvidia
  - defaults
dependencies:
  - python=3.10
  - pytorch=2.0.1
  - torchvision=0.15.2
  - pytorch-cuda=11.8
  - pip
  - pip:
      - transformers>=4.43.3
      - accelerate>=0.30.0
      - numpy>=1.26.4
      - pillow>=10.4.0
      - scikit-image
      - lpips
      - gradio>=3.43.1
      - psutil
      - tqdm
      - kornia
      - wandb
      - bchlib==0.7
      - easydict
